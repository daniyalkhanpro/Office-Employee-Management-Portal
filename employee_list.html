<!DOCTYPE html>
<html>

<head>
<title>Employees</title>
</head>

<body>

<h2>Employee Records</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Designation</th>
<th>DOJ</th>
<th>Experience</th>
<th>Phone</th>
<th>Address</th>
</tr>


{% for emp in employees %}

<tr>

<td>{{emp[0]}}</td>
<td>{{emp[1]}}</td>
<td>{{emp[2]}}</td>
<td>{{emp[3]}}</td>
<td>{{emp[4]}}</td>
<td>{{emp[5]}}</td>
<td>{{emp[6]}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
